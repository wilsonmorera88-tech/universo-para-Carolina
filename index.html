<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nuestro Universo 💖</title>

<style>
html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: radial-gradient(circle at center, #0a0012, #000);
    font-family: Arial;
}

/* ESCENA 3D */
.scene {
    width: 100%;
    height: 100vh;
    perspective: 1200px;
    overflow: hidden;
}

/* UNIVERSO */
.universe {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.2s ease;
}

/* ESTRELLAS */
.star {
    position: absolute;
    border-radius: 50%;
    background: white;
    box-shadow: 0 0 10px rgba(255,255,255,0.8);
}

/* CORAZONES */
.heart {
    position: absolute;
    font-size: 18px;
    pointer-events: none;
    animation: float 4s ease forwards;
}

@keyframes float {
    to {
        transform: translateY(-200px);
        opacity: 0;
    }
}

/* FOTO CENTRAL */
.center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) translateZ(150px);
}

.center img {
    width: 260px;
    border-radius: 20px;
    box-shadow: 0 0 60px rgba(255,100,200,0.8);
}

/* PLANETAS (FOTOS) */
.planet {
    position: absolute;
    width: 100px;
    border-radius: 15px;
    box-shadow: 0 0 30px rgba(255,150,200,0.7);
    transition: transform 0.3s;
}

/* TEXTO */
.title {
    position: absolute;
    top: 10%;
    width: 100%;
    text-align: center;
    font-size: 2.5em;
    color: white;
    text-shadow: 0 0 30px pink;
}
</style>

</head>

<body>

<div class="scene">
    <div class="universe" id="universe">

        <div class="title">💖 Nuestro Universo 💖</div>

        <div class="center">
            <img src="foto1.JPEG">
        </div>

    </div>
</div>

<script>
const universe = document.getElementById("universe");

/* ⭐ CREAR ESTRELLAS EN PROFUNDIDAD */
for (let i = 0; i < 250; i++) {
    let star = document.createElement("div");
    star.className = "star";

    let size = Math.random() * 3;

    star.style.width = size + "px";
    star.style.height = size + "px";

    star.style.left = Math.random() * 100 + "%";
    star.style.top = Math.random() * 100 + "%";

    let z = Math.random() * 800 - 400;
    star.style.transform = `translateZ(${z}px)`;

    universe.appendChild(star);
}

/* 🪐 PLANETAS (FOTOS) */
const fotos = ["foto2.jpg","foto3.jpg","foto4.jpg","foto5.jpg"];

let angle = 0;

let planets = [];

fotos.forEach((f, i) => {
    let img = document.createElement("img");
    img.src = f;
    img.className = "planet";
    universe.appendChild(img);
    planets.push(img);
});

/* ORBITA */
function animatePlanets() {
    angle += 0.005;

    planets.forEach((p, i) => {
        let a = angle + (i * (Math.PI * 2 / planets.length));

        let r = 200 + i * 40;

        let x = Math.cos(a) * r;
        let y = Math.sin(a) * r;

        let z = Math.sin(a) * 150;

        p.style.transform = `
            translateX(${x}px)
            translateY(${y}px)
            translateZ(${z}px)
        `;
    });

    requestAnimationFrame(animatePlanets);
}

animatePlanets();

/* 🖱️ MOVIMIENTO 3D CON MOUSE */
document.addEventListener("mousemove", (e) => {
    let x = (window.innerWidth/2 - e.clientX) / 30;
    let y = (window.innerHeight/2 - e.clientY) / 30;

    universe.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

/* 💖 CORAZONES */
document.addEventListener("mousemove", (e) => {

    if (Math.random() > 0.08) return;

    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";

    heart.style.left = e.clientX + "px";
    heart.style.top = e.clientY + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 4000);
});
</script>

</body>
</html>
