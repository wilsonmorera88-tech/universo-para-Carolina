<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Carolina 💖</title>

<style>
html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: radial-gradient(circle at center, #120018, #000);
    font-family: 'Segoe UI', sans-serif;
}

/* ESCENA */
.scene {
    width: 100%;
    height: 100vh;
    perspective: 1200px;
}

.universe {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.1s ease;
}

/* ESTRELLAS */
.star {
    position: absolute;
    border-radius: 50%;
    background: white;
    box-shadow: 0 0 10px rgba(255,255,255,0.8);
}

/* TEXTO */
.texto {
    position: absolute;
    top: 12%;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 1.6em;
    text-shadow: 0 0 25px pink;
    z-index: 10;
    padding: 0 20px;
}

/* 🌙 LUNA 3D */
.moon {
    position: absolute;
    top: 55%;
    left: 50%;
    width: 220px;
    height: 220px;
    border-radius: 50%;
    transform: translate(-50%, -50%) translateZ(200px);

    /* textura tipo luna */
    background:
        radial-gradient(circle at 30% 30%, #ffffff, #ccc, #888),
        url('https://www.transparenttextures.com/patterns/asfalt-light.png');

    background-blend-mode: overlay;

    /* sombras para volumen */
    box-shadow:
        inset -40px -40px 60px rgba(0,0,0,0.7),
        inset 20px 20px 30px rgba(255,255,255,0.2),
        0 0 40px rgba(255,255,255,0.3);

    animation: rotar 40s linear infinite;
}

/* ROTACIÓN */
@keyframes rotar {
    from { transform: translate(-50%, -50%) translateZ(200px) rotate(0deg); }
    to { transform: translate(-50%, -50%) translateZ(200px) rotate(360deg); }
}

/* CORAZONES */
.heart {
    position: absolute;
    font-size: 18px;
    pointer-events: none;
    animation: subir 3s ease forwards;
}

@keyframes subir {
    to {
        transform: translateY(-200px);
        opacity: 0;
    }
}
</style>

</head>

<body>

<div class="scene">
<div class="universe" id="universe">

<div class="texto">
💖 Carolina…<br><br>
Eres lo más bonito que me ha pasado ✨<br>
y si miro la luna…<br>
siempre me recuerda a ti 🌙💕
</div>

<div class="moon"></div>

</div>
</div>

<script>
const universe = document.getElementById("universe");

/* ⭐ ESTRELLAS 3D */
for (let i = 0; i < 400; i++) {
    let star = document.createElement("div");
    star.className = "star";

    let size = Math.random() * 2;
    star.style.width = size + "px";
    star.style.height = size + "px";

    star.style.left = Math.random() * 100 + "%";
    star.style.top = Math.random() * 100 + "%";

    let z = Math.random() * 800 - 400;
    star.style.transform = `translateZ(${z}px)`;

    universe.appendChild(star);
}

/* 🖱️ MOVIMIENTO 3D */
document.addEventListener("mousemove", (e) => {
    let x = (window.innerWidth/2 - e.clientX) / 30;
    let y = (window.innerHeight/2 - e.clientY) / 30;

    universe.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

/* 💖 CORAZONES */
document.addEventListener("click", (e) => {

    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";

    heart.style.left = e.clientX + "px";
    heart.style.top = e.clientY + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 3000);
});
</script>

</body>
</html>
