<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Saturno 💖</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial;
}

.texto {
    position: absolute;
    top: 10%;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 1.5em;
    text-shadow: 0 0 20px pink;
}
</style>

</head>

<body>

<div class="texto">
💖 En todo el universo… tú eres mi hogar ✨
</div>

<!-- THREE CLÁSICO -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

/* ESCENA */
const scene = new THREE.Scene();

/* CAMARA */
const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

camera.position.z = 4;

/* RENDER */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* LUCES */
const light = new THREE.PointLight(0xffffff, 2);
light.position.set(5,5,5);
scene.add(light);

scene.add(new THREE.AmbientLight(0x404040));

/* TEXTURAS */
const loader = new THREE.TextureLoader();

const saturnTexture = loader.load(
"https://threejs.org/examples/textures/planets/saturn.jpg"
);

const ringTexture = loader.load(
"https://threejs.org/examples/textures/planets/saturnringcolor.jpg"
);

/* PLANETA */
const saturnGeo = new THREE.SphereGeometry(1, 64, 64);
const saturnMat = new THREE.MeshStandardMaterial({
    map: saturnTexture
});

const saturn = new THREE.Mesh(saturnGeo, saturnMat);
scene.add(saturn);

/* ANILLOS (MEJORADOS) */
const ringGeo = new THREE.RingGeometry(1.4, 2.5, 128);
const ringMat = new THREE.MeshBasicMaterial({
    map: ringTexture,
    side: THREE.DoubleSide,
    transparent: true
});

const ring = new THREE.Mesh(ringGeo, ringMat);

/* IMPORTANTE: alineación correcta */
ring.rotation.x = Math.PI / 2.4;

scene.add(ring);

/* ESTRELLAS */
const starsGeometry = new THREE.BufferGeometry();
const starsCount = 3000;
const positions = [];

for (let i = 0; i < starsCount; i++) {
    positions.push((Math.random() - 0.5) * 300);
    positions.push((Math.random() - 0.5) * 300);
    positions.push((Math.random() - 0.5) * 300);
}

starsGeometry.setAttribute(
    'position',
    new THREE.Float32BufferAttribute(positions, 3)
);

const starsMaterial = new THREE.PointsMaterial({
    color: 0xffffff,
    size: 0.15
});

const stars = new THREE.Points(starsGeometry, starsMaterial);
scene.add(stars);

/* ANIMACIÓN */
function animate() {

    requestAnimationFrame(animate);

    /* ROTACIÓN NATURAL */
    saturn.rotation.y += 0.002;
    ring.rotation.z += 0.001;

    renderer.render(scene, camera);
}

animate();

/* 🖱️ INTERACCIÓN REAL */
document.addEventListener("mousemove", (e) => {

    let x = (e.clientX / window.innerWidth - 0.5);
    let y = (e.clientY / window.innerHeight - 0.5);

    saturn.rotation.y += x * 0.03;
    saturn.rotation.x += y * 0.02;

    ring.rotation.z += x * 0.01;
});

/* RESPONSIVE */
window.addEventListener("resize", () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
});

</script>

</body>
</html>
