<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nuestro Universo 💖</title>

<style>
html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: radial-gradient(circle at center, #050010, #000);
    font-family: 'Segoe UI', sans-serif;
}

/* ESCENA */
.scene {
    width: 100%;
    height: 100vh;
    perspective: 1400px;
}

.universe {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.2s ease;
}

/* ⭐ ESTRELLAS */
.star {
    position: absolute;
    border-radius: 50%;
    background: white;
    box-shadow: 0 0 8px rgba(255,255,255,0.8);
}

/* TEXTO */
.texto {
    position: absolute;
    top: 10%;
    width: 100%;
    text-align: center;
    font-size: 1.4em;
    color: white;
    text-shadow: 0 0 20px pink;
}

/* 🌍 JÚPITER */
.jupiter {
    position: absolute;
    top: 55%;
    left: 50%;
    width: 260px;
    height: 260px;
    border-radius: 50%;
    transform: translate(-50%, -50%) translateZ(200px);

    /* TEXTURA REALISTA */
    background: radial-gradient(circle at 30% 30%, #f5c27a, #c97b3b, #7a3f1c);

    box-shadow:
        inset -40px -40px 80px rgba(0,0,0,0.7),
        inset 20px 20px 40px rgba(255,255,255,0.2),
        0 0 80px rgba(255,180,120,0.6);

    animation: girar 30s linear infinite;
}

/* BANDAS DE JÚPITER */
.jupiter::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: repeating-linear-gradient(
        to bottom,
        rgba(255,200,150,0.2),
        rgba(255,200,150,0.2) 10px,
        rgba(150,80,40,0.2) 20px
    );
}

/* ANILLOS */
.ring {
    position: absolute;
    top: 55%;
    left: 50%;
    width: 400px;
    height: 120px;
    border-radius: 50%;
    transform: translate(-50%, -50%) rotateX(75deg) translateZ(190px);

    background: radial-gradient(
        ellipse at center,
        rgba(255,220,180,0.4) 20%,
        rgba(200,150,100,0.3) 40%,
        rgba(0,0,0,0) 70%
    );

    box-shadow: 0 0 40px rgba(255,200,150,0.4);
}

/* ROTACIÓN */
@keyframes girar {
    from { transform: translate(-50%, -50%) translateZ(200px) rotate(0deg); }
    to { transform: translate(-50%, -50%) translateZ(200px) rotate(360deg); }
}

/* 💖 CORAZONES */
.heart {
    position: absolute;
    font-size: 18px;
    animation: subir 4s ease forwards;
}

@keyframes subir {
    to {
        transform: translateY(-200px);
        opacity: 0;
    }
}
</style>

</head>

<body>

<div class="scene">
<div class="universe" id="universe">

    <div class="texto">
        💖 En este universo infinito…<br>
        tú eres mi planeta favorito ✨
    </div>

    <div class="ring"></div>
    <div class="jupiter"></div>

</div>
</div>

<script>
const universe = document.getElementById("universe");

/* ⭐ ESTRELLAS 3D */
for (let i = 0; i < 300; i++) {
    let star = document.createElement("div");
    star.className = "star";

    let size = Math.random() * 2;
    star.style.width = size + "px";
    star.style.height = size + "px";

    star.style.left = Math.random() * 100 + "%";
    star.style.top = Math.random() * 100 + "%";

    let z = Math.random() * 1000 - 500;
    star.style.transform = `translateZ(${z}px)`;

    universe.appendChild(star);
}

/* 🖱️ MOVIMIENTO 3D */
document.addEventListener("mousemove", (e) => {
    let x = (window.innerWidth/2 - e.clientX) / 25;
    let y = (window.innerHeight/2 - e.clientY) / 25;

    universe.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

/* 💖 CORAZONES */
document.addEventListener("mousemove", (e) => {

    if (Math.random() > 0.1) return;

    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";

    heart.style.left = e.clientX + "px";
    heart.style.top = e.clientY + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 4000);
});
</script>

</body>
</html>
