<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Saturno 💖</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
}

.texto {
    position: absolute;
    top: 10%;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 1.5em;
    font-family: Arial;
    text-shadow: 0 0 20px pink;
}
</style>

</head>

<body>

<div class="texto">
💖 En todos los universos… siempre te elegiría a ti ✨
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

/* ESCENA */
const scene = new THREE.Scene();

/* CAMARA */
const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

camera.position.z = 5;

/* RENDER */
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* LUZ */
const light = new THREE.PointLight(0xffffff, 1.5);
light.position.set(5,5,5);
scene.add(light);

/* LUZ AMBIENTE */
scene.add(new THREE.AmbientLight(0x404040));

/* TEXTURA DE SATURNO (REAL) */
const textureLoader = new THREE.TextureLoader();

const saturnTexture = textureLoader.load(
"https://threejsfundamentals.org/threejs/resources/images/planets/saturn.jpg"
);

const saturnRingTexture = textureLoader.load(
"https://threejsfundamentals.org/threejs/resources/images/planets/saturnringcolor.jpg"
);

/* PLANETA */
const geometry = new THREE.SphereGeometry(1, 64, 64);
const material = new THREE.MeshStandardMaterial({
    map: saturnTexture
});

const saturn = new THREE.Mesh(geometry, material);
scene.add(saturn);

/* ANILLOS */
const ringGeometry = new THREE.RingGeometry(1.5, 2.5, 64);

const ringMaterial = new THREE.MeshBasicMaterial({
    map: saturnRingTexture,
    side: THREE.DoubleSide,
    transparent: true
});

const ring = new THREE.Mesh(ringGeometry, ringMaterial);
ring.rotation.x = Math.PI / 2.5;

scene.add(ring);

/* ESTRELLAS */
const starsGeometry = new THREE.BufferGeometry();
const starsCount = 2000;

const positions = [];

for (let i = 0; i < starsCount; i++) {
    positions.push((Math.random() - 0.5) * 200);
    positions.push((Math.random() - 0.5) * 200);
    positions.push((Math.random() - 0.5) * 200);
}

starsGeometry.setAttribute(
    'position',
    new THREE.Float32BufferAttribute(positions, 3)
);

const starsMaterial = new THREE.PointsMaterial({
    color: 0xffffff,
    size: 0.1
});

const stars = new THREE.Points(starsGeometry, starsMaterial);
scene.add(stars);

/* ANIMACIÓN */
function animate() {

    requestAnimationFrame(animate);

    saturn.rotation.y += 0.002;
    ring.rotation.z += 0.001;

    renderer.render(scene, camera);
}

animate();

/* INTERACCIÓN MOUSE */
document.addEventListener("mousemove", (e) => {
    let x = (e.clientX / window.innerWidth - 0.5) * 2;
    let y = (e.clientY / window.innerHeight - 0.5) * 2;

    saturn.rotation.y += x * 0.01;
    saturn.rotation.x += y * 0.01;
});

/* RESPONSIVE */
window.addEventListener("resize", () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
});

</script>

</body>
</html>
