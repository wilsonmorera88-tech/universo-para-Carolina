<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💖</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
}

/* 🌈 FONDO ANIMADO PRO */
body {
    background: linear-gradient(135deg, #ff758c, #ff7eb3, #a18cd1, #fbc2eb);
    background-size: 400% 400%;
    animation: fondo 12s ease infinite;
}

@keyframes fondo {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* CONTENEDOR */
.container {
    position: absolute;
    width: 100%;
    height: 100%;
    perspective: 1000px;
}

/* TITULO */
.title {
    position: absolute;
    top: 10%;
    width: 100%;
    text-align: center;
    font-size: 2.5em;
    color: white;
    text-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* TARJETA CENTRAL */
.card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 300px;
    border-radius: 25px;
    overflow: hidden;
    box-shadow: 0 25px 70px rgba(0,0,0,0.5);
    transition: transform 0.3s ease;
}

.card img {
    width: 100%;
}

/* FOTOS FLOTANTES */
.memory {
    position: absolute;
    width: 120px;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    opacity: 0;
    transition: all 2s ease;
}

/* CORAZONES */
.heart {
    position: absolute;
    font-size: 18px;
    animation: subir 4s ease forwards;
}

@keyframes subir {
    0% { transform: translateY(0) scale(0.8); opacity: 1; }
    100% { transform: translateY(-200px) scale(1.2); opacity: 0; }
}

/* MENSAJE */
.message {
    position: absolute;
    bottom: 30px;
    width: 100%;
    text-align: center;
    font-size: 1.2em;
    color: white;
    opacity: 0;
    transition: opacity 0.5s;
}
</style>

</head>

<body>

<div class="container" id="container">

    <div class="title">💖 Nuestro Mundo 💖</div>

    <div class="card" id="card">
        <img src="foto1.jpg">
    </div>

</div>

<div class="message" id="message"></div>

<script>

const card = document.getElementById("card");
const message = document.getElementById("message");

/* 🖱️ EFECTO 3D SUAVE */
document.addEventListener("mousemove", (e) => {
    let x = (window.innerWidth/2 - e.clientX) / 40;
    let y = (window.innerHeight/2 - e.clientY) / 40;

    card.style.transform = `translate(-50%, -50%) rotateY(${x}deg) rotateX(${y}deg)`;
});

/* 📸 FOTOS + MENSAJES */
const recuerdos = [
    {img:"foto2.jpg", msg:"Nuestro primer momento 💖"},
    {img:"foto3.jpg", msg:"Aquí empezó todo ✨"},
    {img:"foto4.jpg", msg:"Eres lo mejor 💕"}
];

document.addEventListener("click", (e) => {

    let r = recuerdos[Math.floor(Math.random()*recuerdos.length)];

    /* FOTO */
    let img = document.createElement("img");
    img.src = r.img;
    img.className = "memory";

    img.style.left = e.clientX + "px";
    img.style.top = e.clientY + "px";

    document.body.appendChild(img);

    setTimeout(() => {
        img.style.opacity = 1;
        img.style.transform = "translateY(-150px)";
    }, 50);

    setTimeout(() => img.remove(), 2000);

    /* MENSAJE */
    message.innerText = r.msg;
    message.style.opacity = 1;

    setTimeout(() => {
        message.style.opacity = 0;
    }, 2000);

    /* CORAZÓN */
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";

    heart.style.left = e.clientX + "px";
    heart.style.top = e.clientY + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 4000);
});

</script>

</body>
</html>
