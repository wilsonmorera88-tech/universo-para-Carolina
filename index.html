<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Te amo Carolina 💖</title>

<style>
html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: radial-gradient(circle at center, #120018, #000);
    font-family: 'Segoe UI', sans-serif;
}

.scene {
    width: 100%;
    height: 100vh;
    perspective: 1200px;
}

.universe {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.1s ease;
}

.star {
    position: absolute;
    border-radius: 50%;
    background: white;
    box-shadow: 0 0 8px white;
}

/* TEXTO */
.texto {
    position: absolute;
    top: 7%;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 2em;
    line-height: 1.5;

    text-shadow:
        0 0 10px pink,
        0 0 20px pink,
        0 0 40px rgba(255,105,180,0.6);

    z-index: 10;
    padding: 0 20px;
}

/* LUNA Y FOTO */
.moon, .foto {
    position: absolute;
    top: 55%;
    left: 50%;
    width: 240px;
    height: 240px;
    border-radius: 50%;
    transform: translate(-50%, -50%) translateZ(150px);
    transition: all 1s ease;
}

/* LUNA */
.moon {
    background: url('https://upload.wikimedia.org/wikipedia/commons/e/e1/FullMoon2010.jpg');
    background-size: cover;
    cursor: pointer;

    box-shadow:
        inset -20px -15px 40px rgba(0,0,0,0.4),
        inset 15px 15px 30px rgba(255,255,255,0.1);

    animation: brillo 2s infinite alternate;
}

/* BRILLO */
@keyframes brillo {
    from {
        box-shadow:
            inset -20px -15px 40px rgba(0,0,0,0.4),
            inset 15px 15px 30px rgba(255,255,255,0.1),
            0 0 10px rgba(255,105,180,0.3);
    }
    to {
        box-shadow:
            inset -20px -15px 40px rgba(0,0,0,0.4),
            inset 15px 15px 30px rgba(255,255,255,0.1),
            0 0 30px rgba(255,105,180,0.8);
    }
}

/* FOTO */
.foto {
    background: url('foto1.jpeg');
    background-size: cover;
    background-position: center;

    opacity: 0;
    transform: translate(-50%, -50%) scale(0.8);
}

/* TRANSICIÓN */
.moon.hide {
    opacity: 0;
    transform: translate(-50%, -50%) scale(1.2);
}

.foto.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
}

/* INDICADOR */
.indicador {
    position: absolute;
    top: 72%;
    width: 100%;
    text-align: center;
    color: pink;
    font-size: 1.4em;

    text-shadow: 0 0 10px pink;
    animation: flotar 1.5s infinite;

    z-index: 15;
}

@keyframes flotar {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

/* BOTÓN */
.btn {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: pink;
    color: black;
    padding: 10px 20px;
    border-radius: 20px;
    cursor: pointer;
    z-index: 20;
}
</style>

</head>

<body>

<div class="scene">
<div class="universe" id="universe">

<div class="texto">
💖 AMOR…<br><br>

Eres mi universo entero 🌌✨<br>
lo más bonito que me ha pasado 💕<br><br>

Espero que cuando despiertes y veas esto,<br>
sepas que pensé en ti 💖<br><br>

Feliz cumpleaños 🎂💖<br>
Te amo muchísimo 💕
</div>

<div class="moon" id="moon" onclick="cambiar()"></div>
<div class="foto" id="foto"></div>

<div class="indicador">👇 Toca la luna 🌙</div>

</div>
</div>

<div class="btn" onclick="activarMovimiento()">Activar movimiento 💖</div>

<script>
const universe = document.getElementById("universe");

/* ESTRELLAS */
for (let i = 0; i < 400; i++) {
    let star = document.createElement("div");
    star.className = "star";

    let size = Math.random() * 2;
    star.style.width = size + "px";
    star.style.height = size + "px";

    star.style.left = Math.random() * 100 + "%";
    star.style.top = Math.random() * 100 + "%";

    let z = Math.random() * 800 - 400;
    star.style.transform = `translateZ(${z}px)`;

    universe.appendChild(star);
}

/* MOUSE */
document.addEventListener("mousemove", (e) => {
    let x = (window.innerWidth/2 - e.clientX) / 30;
    let y = (window.innerHeight/2 - e.clientY) / 30;

    universe.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

/* CAMBIO LUNA → FOTO */
function cambiar() {
    document.getElementById("moon").classList.add("hide");
    document.getElementById("foto").classList.add("show");

    const indicador = document.querySelector(".indicador");
    if (indicador) {
        indicador.style.opacity = "0";
        indicador.style.transition = "opacity 0.5s";
        setTimeout(() => indicador.remove(), 500);
    }
}

/* CELULAR */
function activarMovimiento() {

    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
        .then(permissionState => {
            if (permissionState === 'granted') {
                window.addEventListener('deviceorientation', mover);
            }
        });
    } else {
        window.addEventListener('deviceorientation', mover);
    }
}

function mover(event) {
    let x = event.gamma;
    let y = event.beta;

    universe.style.transform = `
        rotateY(${x}deg)
        rotateX(${y - 45}deg)
    `;
}
</script>

</body>
</html>
