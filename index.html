<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Carolina 💖</title>

<style>
html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: radial-gradient(circle at center, #120018, #000);
    font-family: 'Segoe UI', sans-serif;
}

/* ESCENA */
.scene {
    width: 100%;
    height: 100vh;
    perspective: 1200px;
}

.universe {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.1s ease;
}

/* ESTRELLAS */
.star {
    position: absolute;
    border-radius: 50%;
    background: white;
    box-shadow: 0 0 8px white;
}

/* TEXTO GRANDE */
.texto {
    position: absolute;
    top: 10%;
    width: 100%;
    text-align: center;
    color: white;

    font-size: 2.2em;
    line-height: 1.4;

    text-shadow:
        0 0 10px pink,
        0 0 20px pink,
        0 0 40px rgba(255,105,180,0.6);

    z-index: 10;
    padding: 0 20px;
}

/* 🌙 LUNA REAL */
.moon {
    position: absolute;
    top: 55%;
    left: 50%;
    width: 240px;
    height: 240px;
    border-radius: 50%;
    transform: translate(-50%, -50%) translateZ(200px);

    background: url('https://upload.wikimedia.org/wikipedia/commons/e/e1/FullMoon2010.jpg');
    background-size: cover;
    background-position: center;

    /* SOMBRA REALISTA (SIN HALO) */
    box-shadow:
        inset -60px -40px 80px rgba(0,0,0,0.8),
        inset 25px 25px 40px rgba(255,255,255,0.15);

    filter: contrast(1.1) brightness(1.05);
}

/* BOTÓN */
.btn {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: pink;
    color: black;
    padding: 10px 20px;
    border-radius: 20px;
    cursor: pointer;
    z-index: 20;
}
</style>

</head>

<body>

<div class="scene">
<div class="universe" id="universe">

<div class="texto">
💖 Carolina…<br><br>
Eres lo más bonito que me ha pasado ✨<br>
y si el universo es infinito…<br>
mi amor por ti también lo es 🌙💕
</div>

<div class="moon"></div>

</div>
</div>

<div class="btn" onclick="activarMovimiento()">Activar movimiento 💖</div>

<script>
const universe = document.getElementById("universe");

/* ⭐ ESTRELLAS 3D */
for (let i = 0; i < 400; i++) {
    let star = document.createElement("div");
    star.className = "star";

    let size = Math.random() * 2;
    star.style.width = size + "px";
    star.style.height = size + "px";

    star.style.left = Math.random() * 100 + "%";
    star.style.top = Math.random() * 100 + "%";

    let z = Math.random() * 800 - 400;
    star.style.transform = `translateZ(${z}px)`;

    universe.appendChild(star);
}

/* 🖱️ MOUSE */
document.addEventListener("mousemove", (e) => {
    let x = (window.innerWidth/2 - e.clientX) / 30;
    let y = (window.innerHeight/2 - e.clientY) / 30;

    universe.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

/* 📱 SENSOR CELULAR */
function activarMovimiento() {

    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
        .then(permissionState => {
            if (permissionState === 'granted') {
                window.addEventListener('deviceorientation', mover);
            }
        });
    } else {
        window.addEventListener('deviceorientation', mover);
    }
}

function mover(event) {
    let x = event.gamma;
    let y = event.beta;

    universe.style.transform = `
        rotateY(${x}deg)
        rotateX(${y - 45}deg)
    `;
}
</script>

</body>
</html>
