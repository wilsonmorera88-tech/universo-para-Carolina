<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nuestro Universo 💖</title>

<style>
html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: radial-gradient(circle at center, #0a0015, #000);
    font-family: 'Segoe UI', sans-serif;
}

/* ESCENA */
.scene {
    width: 100%;
    height: 100vh;
    perspective: 1200px;
}

.universe {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.2s ease;
}

/* ESTRELLAS */
.star {
    position: absolute;
    border-radius: 50%;
    background: white;
    box-shadow: 0 0 10px rgba(255,255,255,0.8);
}

/* TEXTO */
.texto {
    position: absolute;
    top: 12%;
    width: 100%;
    text-align: center;
    font-size: 1.4em;
    color: white;
    text-shadow: 0 0 25px pink;
    z-index: 5;
}

/* 🌍 PLANETA DEL AMOR */
.planet {
    position: absolute;
    top: 55%;
    left: 50%;
    width: 260px;
    height: 260px;
    border-radius: 50%;
    transform: translate(-50%, -50%) translateZ(200px);
    
    /* textura + color */
    background: radial-gradient(circle at 30% 30%, #ff9ad5, #ff4da6, #800040);
    
    /* iluminación */
    box-shadow:
        inset -20px -20px 50px rgba(0,0,0,0.6),
        inset 10px 10px 30px rgba(255,255,255,0.2),
        0 0 60px rgba(255,100,200,0.8);

    animation: girar 20s linear infinite;
}

/* ROTACIÓN */
@keyframes girar {
    from { transform: translate(-50%, -50%) translateZ(200px) rotate(0deg); }
    to { transform: translate(-50%, -50%) translateZ(200px) rotate(360deg); }
}

/* CORAZONES */
.heart {
    position: absolute;
    font-size: 18px;
    pointer-events: none;
    animation: subir 4s ease forwards;
}

@keyframes subir {
    to {
        transform: translateY(-200px);
        opacity: 0;
    }
}
</style>

</head>

<body>

<div class="scene">
<div class="universe" id="universe">

    <!-- TEXTO -->
    <div class="texto">
        💖 Eres mi lugar favorito en todo el universo ✨<br>
        y si volviera a vivir… te elegiría siempre 💕
    </div>

    <!-- PLANETA -->
    <div class="planet"></div>

</div>
</div>

<script>
const universe = document.getElementById("universe");

/* ⭐ ESTRELLAS 3D */
for (let i = 0; i < 250; i++) {
    let star = document.createElement("div");
    star.className = "star";

    let size = Math.random() * 2;
    star.style.width = size + "px";
    star.style.height = size + "px";

    star.style.left = Math.random() * 100 + "%";
    star.style.top = Math.random() * 100 + "%";

    let z = Math.random() * 800 - 400;
    star.style.transform = `translateZ(${z}px)`;

    universe.appendChild(star);
}

/* 🖱️ MOVIMIENTO 3D */
document.addEventListener("mousemove", (e) => {
    let x = (window.innerWidth/2 - e.clientX) / 30;
    let y = (window.innerHeight/2 - e.clientY) / 30;

    universe.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

/* 💖 CORAZONES */
document.addEventListener("mousemove", (e) => {

    if (Math.random() > 0.08) return;

    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";

    heart.style.left = e.clientX + "px";
    heart.style.top = e.clientY + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 4000);
});
</script>

</body>
</html>
