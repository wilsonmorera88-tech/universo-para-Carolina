<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nuestro Universo 💖</title>

<style>
html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: radial-gradient(circle at center, #0a0015, #000);
    font-family: 'Segoe UI', sans-serif;
    color: white;
}

/* ESCENA 3D */
.scene {
    width: 100%;
    height: 100vh;
    perspective: 1200px;
}

.universe {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.2s ease;
}

/* ESTRELLAS */
.star {
    position: absolute;
    border-radius: 50%;
    background: white;
    box-shadow: 0 0 10px rgba(255,255,255,0.8);
}

/* TEXTO */
.texto {
    position: absolute;
    top: 15%;
    width: 100%;
    text-align: center;
    font-size: 1.5em;
    line-height: 1.6em;
    text-shadow: 0 0 20px pink;
    z-index: 5;
}

/* IMAGEN CENTRAL */
.center {
    position: absolute;
    top: 55%;
    left: 50%;
    transform: translate(-50%, -50%) translateZ(150px);
}

.center img {
    width: 260px;
    border-radius: 20px;
    box-shadow: 0 0 60px rgba(255,100,200,0.8);
}

/* FOTOS FLOTANTES */
.memory {
    position: absolute;
    width: 100px;
    border-radius: 15px;
    opacity: 0;
    transition: all 2s ease;
    box-shadow: 0 0 30px pink;
}

/* CORAZONES */
.heart {
    position: absolute;
    font-size: 18px;
    pointer-events: none;
    animation: subir 4s ease forwards;
}

@keyframes subir {
    to {
        transform: translateY(-200px);
        opacity: 0;
    }
}
</style>

</head>

<body>

<div class="scene">
<div class="universe" id="universe">

    <!-- TEXTO ROMÁNTICO -->
    <div class="texto">
        💖 No sé en qué momento te volviste mi lugar favorito,<br>
        pero ahora todo tiene más sentido contigo ✨<br><br>
        Si el universo existe…<br>
        seguro es para que tú y yo nos encontráramos 💕
    </div>

    <!-- IMAGEN CENTRAL -->
    <div class="center" id="card">
        <img src="https://images.unsplash.com/photo-1518199266791-5375a83190b7">
    </div>

</div>
</div>

<script>
const universe = document.getElementById("universe");
const card = document.getElementById("card");

/* ⭐ ESTRELLAS EN PROFUNDIDAD */
for (let i = 0; i < 250; i++) {
    let star = document.createElement("div");
    star.className = "star";

    let size = Math.random() * 2;
    star.style.width = size + "px";
    star.style.height = size + "px";

    star.style.left = Math.random() * 100 + "%";
    star.style.top = Math.random() * 100 + "%";

    let z = Math.random() * 800 - 400;
    star.style.transform = `translateZ(${z}px)`;

    universe.appendChild(star);
}

/* 🖱️ MOVIMIENTO 3D */
document.addEventListener("mousemove", (e) => {
    let x = (window.innerWidth/2 - e.clientX) / 30;
    let y = (window.innerHeight/2 - e.clientY) / 30;

    universe.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

/* 📸 IMÁGENES BONITAS */
const fotos = [
"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee",
"https://images.unsplash.com/photo-1511988617509-a57c8a288659",
"https://images.unsplash.com/photo-1519741497674-611481863552"
];

document.addEventListener("mousemove", (e) => {

    if (Math.random() > 0.07) return;

    let img = document.createElement("img");
    img.src = fotos[Math.floor(Math.random()*fotos.length)];
    img.className = "memory";

    img.style.left = e.clientX + "px";
    img.style.top = e.clientY + "px";

    document.body.appendChild(img);

    setTimeout(() => {
        img.style.opacity = 1;
        img.style.transform = "translateY(-150px)";
    }, 50);

    setTimeout(() => img.remove(), 2000);
});

/* 💖 CORAZONES */
document.addEventListener("click", (e) => {

    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";

    heart.style.left = e.clientX + "px";
    heart.style.top = e.clientY + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 4000);
});
</script>

</body>
</html>
