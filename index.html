<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nuestro Universo 💖</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial;
}

/* CANVAS */
canvas {
    display: block;
}

/* IMÁGENES FLOTANTES */
.float {
    position: absolute;
    width: 100px;
    border-radius: 50%;
    pointer-events: none;
    opacity: 0;
    transform: scale(0.8);
    transition: all 2.5s ease;
    box-shadow: 0 0 25px rgba(255,100,200,0.8);
}
</style>

</head>

<body>

<canvas id="galaxy"></canvas>

<script>
const canvas = document.getElementById("galaxy");
const ctx = canvas.getContext("2d");

/* RESPONSIVE */
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* ===== GALAXIA ===== */
let particles = [];
const total = 2000;

for (let i = 0; i < total; i++) {
    let angle = Math.random() * Math.PI * 2;
    let radius = Math.random() * 350;

    particles.push({
        angle: angle,
        radius: radius,
        speed: 0.001 + Math.random() * 0.002,
        size: Math.random() * 2
    });
}

let mouseX = 0;
let mouseY = 0;

document.addEventListener("mousemove", (e) => {
    mouseX = (e.clientX - canvas.width / 2) * 0.0005;
    mouseY = (e.clientY - canvas.height / 2) * 0.0005;
});

/* ===== DIBUJO ===== */
function draw() {

    /* FONDO SUAVE (efecto rastro) */
    ctx.fillStyle = "rgba(0,0,0,0.15)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {

        p.angle += p.speed;

        let x = canvas.width/2 + Math.cos(p.angle + mouseX) * p.radius;
        let y = canvas.height/2 + Math.sin(p.angle + mouseY) * p.radius;

        /* COLOR GALAXIA PRO */
        let gradient = ctx.createRadialGradient(x,y,0,x,y,4);
        gradient.addColorStop(0, "white");
        gradient.addColorStop(0.2, "hotpink");
        gradient.addColorStop(0.5, "orange");
        gradient.addColorStop(1, "purple");

        ctx.fillStyle = gradient;

        ctx.beginPath();
        ctx.arc(x, y, p.size, 0, Math.PI * 2);
        ctx.fill();
    });

    /* CENTRO (agujero negro glow) */
    let centerGradient = ctx.createRadialGradient(
        canvas.width/2,
        canvas.height/2,
        0,
        canvas.width/2,
        canvas.height/2,
        80
    );

    centerGradient.addColorStop(0, "black");
    centerGradient.addColorStop(0.5, "orange");
    centerGradient.addColorStop(1, "transparent");

    ctx.fillStyle = centerGradient;
    ctx.beginPath();
    ctx.arc(canvas.width/2, canvas.height/2, 80, 0, Math.PI*2);
    ctx.fill();

    requestAnimationFrame(draw);
}

draw();

/* ===== FOTOS FLOTANTES BONITAS ===== */

const fotos = [
    "foto1.jpg",
    "foto2.jpg",
    "foto3.jpg",
    "foto4.jpg"
];

document.addEventListener("mousemove", (e) => {

    if (Math.random() > 0.08) return;

    let img = document.createElement("img");

    img.src = fotos[Math.floor(Math.random()*fotos.length)];
    img.className = "float";

    img.style.left = (e.clientX - 50) + "px";
    img.style.top = (e.clientY - 50) + "px";

    document.body.appendChild(img);

    setTimeout(() => {
        img.style.opacity = 1;
        img.style.transform = "translateY(-200px) scale(1)";
    }, 50);

    setTimeout(() => {
        img.style.opacity = 0;
    }, 1800);

    setTimeout(() => {
        img.remove();
    }, 2500);
});

</script>

</body>
</html>
