<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Carolina 💖</title>

<style>
html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: radial-gradient(circle at center, #120018, #000);
    font-family: 'Segoe UI', sans-serif;
}

/* ESCENA 3D */
.scene {
    width: 100%;
    height: 100vh;
    perspective: 1200px;
}

.universe {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.1s ease;
}

/* ESTRELLAS */
.star {
    position: absolute;
    border-radius: 50%;
    background: white;
    box-shadow: 0 0 10px rgba(255,255,255,0.8);
}

/* TEXTO */
.texto {
    position: absolute;
    top: 12%;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 1.6em;
    text-shadow: 0 0 25px pink;
    z-index: 10;
    padding: 0 20px;
}

/* CORAZÓN CENTRAL */
.heart-core {
    position: absolute;
    top: 55%;
    left: 50%;
    transform: translate(-50%, -50%) translateZ(200px);
    font-size: 120px;
    color: #ff4da6;
    text-shadow:
        0 0 20px #ff4da6,
        0 0 40px #ff4da6,
        0 0 60px #ff80bf;

    animation: latido 2s infinite;
}

/* LATIDO */
@keyframes latido {
    0%, 100% { transform: translate(-50%, -50%) translateZ(200px) scale(1); }
    50% { transform: translate(-50%, -50%) translateZ(200px) scale(1.2); }
}

/* CORAZONES FLOTANTES */
.heart {
    position: absolute;
    font-size: 18px;
    pointer-events: none;
    animation: subir 3s ease forwards;
}

@keyframes subir {
    to {
        transform: translateY(-200px);
        opacity: 0;
    }
}
</style>

</head>

<body>

<div class="scene">
<div class="universe" id="universe">

<div class="texto">
💖 Carolina…<br><br>
Eres lo más bonito que me ha pasado ✨<br>
y si el universo es infinito…<br>
mi amor por ti también lo es 💕
</div>

<div class="heart-core">💖</div>

</div>
</div>

<script>
const universe = document.getElementById("universe");

/* ⭐ CREAR ESTRELLAS EN 3D */
for (let i = 0; i < 400; i++) {
    let star = document.createElement("div");
    star.className = "star";

    let size = Math.random() * 2;
    star.style.width = size + "px";
    star.style.height = size + "px";

    star.style.left = Math.random() * 100 + "%";
    star.style.top = Math.random() * 100 + "%";

    let z = Math.random() * 800 - 400;
    star.style.transform = `translateZ(${z}px)`;

    universe.appendChild(star);
}

/* 🖱️ MOVIMIENTO 3D */
document.addEventListener("mousemove", (e) => {
    let x = (window.innerWidth/2 - e.clientX) / 30;
    let y = (window.innerHeight/2 - e.clientY) / 30;

    universe.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

/* 💖 CORAZONES INTERACTIVOS */
document.addEventListener("click", (e) => {

    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";

    heart.style.left = e.clientX + "px";
    heart.style.top = e.clientY + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 3000);
});
</script>

</body>
</html>
