<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Universo 🪐</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #050510;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Fondo de estrellas */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background: transparent url('https://githubusercontent.com') repeat;
            animation: moveStars 100s linear infinite;
        }

        @keyframes moveStars {
            from { background-position: 0 0; }
            to { background-position: -10000px 5000px; }
        }

        /* Contenedor Principal */
        .container {
            z-index: 10;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 30px rgba(100, 100, 255, 0.2);
            max-width: 80%;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            background: linear-gradient(to right, #a18cd1, #fbc2eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.2em;
            line-height: 1.6;
            color: #d1d1d1;
        }

        .heart {
            color: #ff4d4d;
            font-size: 2em;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .footer-text {
            font-size: 0.8em;
            margin-top: 30px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="container">
        <!-- EDITABLE: Tu mensaje aquí -->
        <h1>Hola, mi universo 🌌</h1>
        <p>
            Eres la razón por la que mi cielo siempre está iluminado.<br>
            Cada estrella me recuerda a ti. <br>
            Gracias por ser mi lugar favorito.
        </p>
        <div class="heart">❤️</div>
        <p class="footer-text">Te amo por siempre.</p>
    </div>
</body>
</html>
