<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💖</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #2b1b2b, #000);
    color: white;
}

/* FONDO SUAVE (luces) */
.bokeh {
    position: fixed;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

.bokeh span {
    position: absolute;
    width: 10px;
    height: 10px;
    background: pink;
    border-radius: 50%;
    opacity: 0.3;
    animation: float 10s linear infinite;
}

@keyframes float {
    from {
        transform: translateY(100vh) scale(0.5);
    }
    to {
        transform: translateY(-10vh) scale(1.2);
    }
}

/* CONTENIDO */
.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 2;
}

/* FOTO */
.card {
    width: 280px;
    border-radius: 20px;
    overflow: hidden;
    margin: auto;
    box-shadow: 0 0 40px rgba(255,150,200,0.5);
    transition: transform 0.4s ease;
}

.card img {
    width: 100%;
}

/* TEXTO */
h1 {
    font-weight: 300;
    letter-spacing: 2px;
}

p {
    opacity: 0.8;
}

/* BOTON */
button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: pink;
    color: black;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="bokeh" id="bokeh"></div>

<div class="container">
    <h1>💖 Para ti</h1>

    <div class="card" id="card">
        <img src="foto1.jpg">
    </div>

    <p>Desde que llegaste, todo cambió ✨</p>

    <button onclick="mostrarMensaje()">Abrir mi corazón 💌</button>
</div>

<script>

/* CREAR LUCES */
const bokeh = document.getElementById("bokeh");

for (let i = 0; i < 40; i++) {
    let span = document.createElement("span");

    span.style.left = Math.random() * 100 + "%";
    span.style.animationDuration = (5 + Math.random() * 10) + "s";
    span.style.width = span.style.height = (5 + Math.random() * 15) + "px";

    bokeh.appendChild(span);
}

/* EFECTO 3D SUAVE */
const card = document.getElementById("card");

document.addEventListener("mousemove", (e) => {
    let x = (window.innerWidth/2 - e.pageX) / 60;
    let y = (window.innerHeight/2 - e.pageY) / 60;

    card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

/* MENSAJE */
function mostrarMensaje() {
    alert("Eres lo mejor que me ha pasado 💖");
}
</script>

</body>
</html>
