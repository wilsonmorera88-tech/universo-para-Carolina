<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Saturno 💖</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
}

.texto {
    position: absolute;
    top: 10%;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 1.5em;
    text-shadow: 0 0 20px pink;
    z-index: 10;
}
</style>
</head>

<body>

<div class="texto">
💖 Eres mi universo entero ✨
</div>

<!-- THREE -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>

<script>

/* VALIDACIÓN */
if (!THREE) {
    alert("No cargó Three.js");
}

/* ESCENA */
const scene = new THREE.Scene();

/* CAMARA */
const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);
camera.position.z = 4;

/* RENDER */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* LUCES */
const light = new THREE.PointLight(0xffffff, 2);
light.position.set(5, 5, 5);
scene.add(light);

scene.add(new THREE.AmbientLight(0x404040));

/* TEXTURAS */
const loader = new THREE.TextureLoader();

const saturnTexture = loader.load(
"https://threejs.org/examples/textures/planets/saturn.jpg"
);

const ringTexture = loader.load(
"https://threejs.org/examples/textures/planets/saturnringcolor.jpg"
);

/* PLANETA */
const saturn = new THREE.Mesh(
    new THREE.SphereGeometry(1, 64, 64),
    new THREE.MeshStandardMaterial({ map: saturnTexture })
);
scene.add(saturn);

/* ANILLOS */
const ring = new THREE.Mesh(
    new THREE.RingGeometry(1.4, 2.5, 128),
    new THREE.MeshBasicMaterial({
        map: ringTexture,
        side: THREE.DoubleSide,
        transparent: true
    })
);

/* CORRECCIÓN DE ORIENTACIÓN */
ring.rotation.x = Math.PI / 2.3;

scene.add(ring);

/* ESTRELLAS */
const starGeo = new THREE.BufferGeometry();
const starVertices = [];

for (let i = 0; i < 3000; i++) {
    starVertices.push(
        (Math.random() - 0.5) * 300,
        (Math.random() - 0.5) * 300,
        (Math.random() - 0.5) * 300
    );
}

starGeo.setAttribute(
    "position",
    new THREE.Float32BufferAttribute(starVertices, 3)
);

const stars = new THREE.Points(
    starGeo,
    new THREE.PointsMaterial({ color: 0xffffff, size: 0.2 })
);

scene.add(stars);

/* ANIMACIÓN */
function animate() {
    requestAnimationFrame(animate);

    saturn.rotation.y += 0.003;
    ring.rotation.z += 0.001;

    renderer.render(scene, camera);
}

animate();

/* MOVIMIENTO CON MOUSE */
document.addEventListener("mousemove", (e) => {
    const x = (e.clientX / window.innerWidth - 0.5);
    const y = (e.clientY / window.innerHeight - 0.5);

    saturn.rotation.y += x * 0.05;
    saturn.rotation.x += y * 0.05;
});

/* RESPONSIVE */
window.addEventListener("resize", () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
});

</script>

</body>
</html>
