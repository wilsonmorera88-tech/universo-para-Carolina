<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nuestro Universo 💖</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial;
    color: white;
}

/* Canvas */
canvas {
    position: fixed;
    top: 0;
    left: 0;
}

/* INTRO */
.intro {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
    cursor: pointer;
}

.intro img {
    width: 250px;
    border-radius: 20px;
    box-shadow: 0 0 30px white;
}

.intro h1 {
    margin-top: 20px;
}

/* CONTENIDO */
.container {
    position: absolute;
    width: 100%;
    top: 50%;
    transform: translateY(-50%);
    text-align: center;
    z-index: 2;
}

/* TARJETA */
.card {
    width: 320px;
    margin: auto;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(255,255,255,0.4);
    transition: transform 0.2s;
}

.card img {
    width: 100%;
}

/* CORAZONES */
.heart {
    position: absolute;
    font-size: 20px;
    animation: float 3s linear forwards;
}

@keyframes float {
    to {
        transform: translateY(-200px);
        opacity: 0;
    }
}
</style>

</head>

<body>

<!-- INTRO -->
<div class="intro" id="intro">
    <img src="foto1.jpg">
    <h1>Haz clic para entrar a nuestro universo 💖</h1>
</div>

<!-- MUSICA -->
<audio id="music" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<!-- ESTRELLAS -->
<canvas id="stars"></canvas>

<div class="container">
    <h1>🌌 Nuestro Universo 💖</h1>

    <div class="card" id="card">
        <img src="foto2.jpg">
    </div>

    <p>Contigo todo es infinito ✨</p>
</div>

<script>

/* ===== INTRO ===== */
const intro = document.getElementById("intro");
const music = document.getElementById("music");

intro.addEventListener("click", () => {
    intro.style.display = "none";
    music.play();
});

/* ===== ESTRELLAS ===== */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 200; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        z: Math.random() * 2
    });
}

function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    stars.forEach(star => {
        ctx.fillStyle = "white";
        ctx.fillRect(star.x, star.y, star.z, star.z);
    });
}

function moveStars(e) {
    stars.forEach(star => {
        star.x += (e.clientX - canvas.width/2) * 0.0003 * star.z;
        star.y += (e.clientY - canvas.height/2) * 0.0003 * star.z;
    });
}

document.addEventListener("mousemove", moveStars);

function animate() {
    drawStars();
    requestAnimationFrame(animate);
}

animate();

/* ===== EFECTO 3D TARJETA ===== */
const card = document.getElementById("card");

document.addEventListener("mousemove", (e) => {
    let x = (window.innerWidth/2 - e.pageX) / 20;
    let y = (window.innerHeight/2 - e.pageY) / 20;

    card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

/* ===== CORAZONES ===== */
document.addEventListener("click", (e) => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.style.left = e.clientX + "px";
    heart.style.top = e.clientY + "px";
    heart.innerHTML = "💖";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 3000);
});

/* ===== IMÁGENES FLOTANTES CON SOMBRA ===== */

const imagenes = [
    "foto1.jpg",
    "foto2.jpg",
    "foto3.jpg",
    "foto4.jpg",
    "foto5.jpg"
];

document.addEventListener("mousemove", (e) => {

    if (Math.random() > 0.15) return;

    let img = document.createElement("img");

    img.src = imagenes[Math.floor(Math.random() * imagenes.length)];

    img.style.position = "absolute";
    img.style.left = e.clientX + "px";
    img.style.top = e.clientY + "px";
    img.style.width = "90px";
    img.style.borderRadius = "12px";
    img.style.pointerEvents = "none";
    img.style.zIndex = 3;

    /* SOMBRA PRO */
    img.style.boxShadow = "0 0 20px rgba(255,255,255,0.7)";

    img.style.opacity = 1;
    img.style.transition = "all 2s ease-out";

    document.body.appendChild(img);

    setTimeout(() => {
        img.style.transform = "translateY(-180px) scale(1.3)";
        img.style.opacity = 0;
    }, 50);

    setTimeout(() => {
        img.remove();
    }, 2000);
});

</script>

</body>
</html>
