<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nuestro Mundo 💖</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle at center, #1a001f, #000);
    font-family: Arial;
    color: white;
    perspective: 1000px;
}

/* CONTENEDOR 3D */
.scene {
    position: absolute;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
}

/* CAPAS */
.layer {
    position: absolute;
    width: 100%;
    height: 100%;
}

/* PARTÍCULAS */
.particle {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, #ff9ad5, transparent);
    opacity: 0.8;
}

/* FOTO CENTRAL */
.card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 260px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(255,100,200,0.8);
    z-index: 5;
}

.card img {
    width: 100%;
}

/* FOTOS FLOTANTES */
.memory {
    position: absolute;
    width: 100px;
    border-radius: 15px;
    box-shadow: 0 0 30px rgba(255,150,200,0.8);
    transform: translateZ(0px);
    transition: transform 0.3s;
}

/* TEXTO */
.title {
    position: absolute;
    top: 15%;
    width: 100%;
    text-align: center;
    font-size: 2.5em;
    text-shadow: 0 0 30px rgba(255,150,200,0.8);
}
</style>
</head>

<body>

<div class="scene" id="scene">

    <div class="layer" id="layer1"></div>
    <div class="layer" id="layer2"></div>

    <div class="card">
        <img src="foto1.jpg">
    </div>

    <div class="title">💖 Nuestro Mundo 💖</div>

</div>

<script>
const scene = document.getElementById("scene");

/* ===== PARTÍCULAS ===== */
function crearParticulas(layer, cantidad, profundidad) {
    for (let i = 0; i < cantidad; i++) {
        let p = document.createElement("div");
        p.className = "particle";

        let size = Math.random() * 6 + 2;

        p.style.width = size + "px";
        p.style.height = size + "px";

        p.style.left = Math.random() * 100 + "%";
        p.style.top = Math.random() * 100 + "%";

        p.style.transform = `translateZ(${profundidad}px)`;

        layer.appendChild(p);
    }
}

crearParticulas(document.getElementById("layer1"), 80, -100);
crearParticulas(document.getElementById("layer2"), 60, 100);

/* ===== FOTOS EN 3D ===== */
const fotos = ["foto1.jpg","foto2.jpg","foto3.jpg","foto4.jpg"];

for (let i = 0; i < 8; i++) {
    let img = document.createElement("img");
    img.src = fotos[i % fotos.length];
    img.className = "memory";

    img.style.left = Math.random() * 90 + "%";
    img.style.top = Math.random() * 90 + "%";

    let z = Math.random() * 400 - 200;
    img.style.transform = `translateZ(${z}px)`;

    scene.appendChild(img);
}

/* ===== MOVIMIENTO 3D ===== */
document.addEventListener("mousemove", (e) => {

    let x = (window.innerWidth/2 - e.clientX) / 40;
    let y = (window.innerHeight/2 - e.clientY) / 40;

    scene.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});
</script>

</body>
</html>
