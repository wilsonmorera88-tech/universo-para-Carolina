<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Saturno 💖</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
}

.texto {
    position: absolute;
    top: 10%;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 1.5em;
    font-family: Arial;
    text-shadow: 0 0 20px pink;
}
</style>

</head>

<body>

<div class="texto">
💖 En todos los universos… siempre te elegiría a ti ✨
</div>

<!-- THREE MODERNO -->
<script type="module">

import * as THREE from "https://unpkg.com/three@0.152.2/build/three.module.js";

/* ESCENA */
const scene = new THREE.Scene();

/* CAMARA */
const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

camera.position.z = 4;

/* RENDER */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* LUZ */
const light = new THREE.PointLight(0xffffff, 2);
light.position.set(5,5,5);
scene.add(light);

scene.add(new THREE.AmbientLight(0x404040));

/* TEXTURAS */
const loader = new THREE.TextureLoader();

const saturnTexture = loader.load(
"https://threejs.org/examples/textures/planets/saturn.jpg"
);

const ringTexture = loader.load(
"https://threejs.org/examples/textures/planets/saturnringcolor.jpg"
);

/* PLANETA */
const geometry = new THREE.SphereGeometry(1, 64, 64);
const material = new THREE.MeshStandardMaterial({
    map: saturnTexture
});

const saturn = new THREE.Mesh(geometry, material);
scene.add(saturn);

/* ANILLOS */
const ringGeo = new THREE.RingGeometry(1.4, 2.3, 64);
const ringMat = new THREE.MeshBasicMaterial({
    map: ringTexture,
    side: THREE.DoubleSide,
    transparent: true
});

const ring = new THREE.Mesh(ringGeo, ringMat);
ring.rotation.x = Math.PI / 2.5;
scene.add(ring);

/* ESTRELLAS */
const starsGeometry = new THREE.BufferGeometry();
const stars = [];

for (let i = 0; i < 2000; i++) {
    stars.push(
        (Math.random() - 0.5) * 200,
        (Math.random() - 0.5) * 200,
        (Math.random() - 0.5) * 200
    );
}

starsGeometry.setAttribute(
    "position",
    new THREE.Float32BufferAttribute(stars, 3)
);

const starsMaterial = new THREE.PointsMaterial({
    color: 0xffffff,
    size: 0.1
});

const starField = new THREE.Points(starsGeometry, starsMaterial);
scene.add(starField);

/* ANIMACIÓN */
function animate() {
    requestAnimationFrame(animate);

    saturn.rotation.y += 0.002;
    ring.rotation.z += 0.001;

    renderer.render(scene, camera);
}

animate();

/* MOUSE */
document.addEventListener("mousemove", (e) => {
    let x = (e.clientX / window.innerWidth - 0.5);
    let y = (e.clientY / window.innerHeight - 0.5);

    saturn.rotation.y += x * 0.05;
    saturn.rotation.x += y * 0.05;
});

/* RESPONSIVE */
window.addEventListener("resize", () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
});

</script>

</body>
</html>
