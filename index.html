<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nuestro Universo 💖</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle at center, #1a0f1f, #000);
    font-family: Arial;
    color: white;
}

/* CANVAS */
canvas {
    position: fixed;
    top: 0;
    left: 0;
}

/* TEXTO */
.center {
    position: absolute;
    top: 50%;
    width: 100%;
    text-align: center;
    transform: translateY(-50%);
    z-index: 2;
}

h1 {
    font-size: 2.5em;
    font-weight: 300;
    letter-spacing: 2px;
    text-shadow: 0 0 25px rgba(255,150,200,0.6);
}

/* FOTO CENTRAL */
.card {
    width: 260px;
    margin: 20px auto;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(255,150,200,0.4);
    transition: transform 0.4s ease;
}

.card img {
    width: 100%;
}

/* FOTOS FLOTANTES */
.memory {
    position: absolute;
    width: 110px;
    border-radius: 15px;
    opacity: 0;
    pointer-events: none;
    filter: blur(0.5px);
    box-shadow: 0 0 30px rgba(255,150,200,0.6);
    transition: all 3s ease;
}
</style>

</head>

<body>

<canvas id="galaxy"></canvas>

<div class="center">
    <h1>✨ Nuestro Universo 💖</h1>

    <div class="card" id="card">
        <img src="foto1.jpg">
    </div>

    <p>Desde que llegaste, todo es más bonito 💫</p>
</div>

<script>
const canvas = document.getElementById("galaxy");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* 🌌 ESTRELLAS SUAVES */
let stars = [];

for (let i = 0; i < 200; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.5,
        speed: Math.random() * 0.2
    });
}

function drawStars() {
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    stars.forEach(s => {
        s.y += s.speed;
        if (s.y > canvas.height) s.y = 0;

        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
        ctx.fillStyle = "rgba(255,200,230,0.8)";
        ctx.fill();
    });
}

function animate() {
    drawStars();
    requestAnimationFrame(animate);
}
animate();

/* 💖 EFECTO SUAVE 3D */
const card = document.getElementById("card");

document.addEventListener("mousemove", (e) => {
    let x = (window.innerWidth/2 - e.pageX) / 60;
    let y = (window.innerHeight/2 - e.pageY) / 60;

    card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

/* 📸 RECUERDOS FLOTANTES */
const fotos = ["foto1.jpg","foto2.jpg","foto3.jpg","foto4.jpg"];

document.addEventListener("mousemove", (e) => {

    if (Math.random() > 0.06) return;

    let img = document.createElement("img");
    img.src = fotos[Math.floor(Math.random()*fotos.length)];
    img.className = "memory";

    img.style.left = (e.clientX - 50) + "px";
    img.style.top = (e.clientY - 50) + "px";

    document.body.appendChild(img);

    setTimeout(() => {
        img.style.opacity = 1;
        img.style.transform = "translateY(-250px) scale(1)";
    }, 50);

    setTimeout(() => {
        img.style.opacity = 0;
    }, 2000);

    setTimeout(() => {
        img.remove();
    }, 3000);
});
</script>

</body>
</html>
