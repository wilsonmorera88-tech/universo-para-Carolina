<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galaxia 💖</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
}

/* canvas */
canvas {
    display: block;
}

/* imágenes flotantes */
.float {
    position: absolute;
    width: 90px;
    border-radius: 50%;
    pointer-events: none;
    box-shadow: 0 0 20px rgba(255,100,200,0.8);
}
</style>
</head>

<body>

<canvas id="galaxy"></canvas>

<script>
const canvas = document.getElementById("galaxy");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* ===== GALAXIA ===== */
let particles = [];
const total = 1500;

for (let i = 0; i < total; i++) {
    let angle = Math.random() * Math.PI * 2;
    let radius = Math.random() * 300;

    particles.push({
        angle: angle,
        radius: radius,
        speed: 0.001 + Math.random() * 0.002,
        size: Math.random() * 2
    });
}

let mouseX = 0;
let mouseY = 0;

document.addEventListener("mousemove", (e) => {
    mouseX = (e.clientX - canvas.width / 2) * 0.0005;
    mouseY = (e.clientY - canvas.height / 2) * 0.0005;
});

function draw() {
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
        p.angle += p.speed;

        let x = canvas.width/2 + Math.cos(p.angle + mouseX) * p.radius;
        let y = canvas.height/2 + Math.sin(p.angle + mouseY) * p.radius;

        /* COLOR GALAXIA */
        let gradient = ctx.createRadialGradient(x,y,0,x,y,3);
        gradient.addColorStop(0, "white");
        gradient.addColorStop(0.3, "pink");
        gradient.addColorStop(1, "purple");

        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(x, y, p.size, 0, Math.PI * 2);
        ctx.fill();
    });

    requestAnimationFrame(draw);
}

draw();

/* ===== FOTOS FLOTANTES ===== */
const fotos = ["foto1.jpg","foto2.jpg","foto3.jpg"];

document.addEventListener("click", (e) => {

    let img = document.createElement("img");
    img.src = fotos[Math.floor(Math.random()*fotos.length)];
    img.className = "float";

    img.style.left = e.clientX + "px";
    img.style.top = e.clientY + "px";

    document.body.appendChild(img);

    setTimeout(() => {
        img.style.transform = "translateY(-200px)";
        img.style.opacity = 0;
    }, 100);

    setTimeout(() => img.remove(), 2000);
});
</script>

</body>
</html>
