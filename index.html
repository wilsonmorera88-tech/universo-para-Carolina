<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Carolina 💖</title>

<style>
html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: radial-gradient(circle at center, #120018, #000);
    font-family: 'Segoe UI', sans-serif;
}

/* ESCENA */
.scene {
    width: 100%;
    height: 100vh;
    perspective: 1200px;
}

.universe {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.1s ease;
}

/* ESTRELLAS */
.star {
    position: absolute;
    border-radius: 50%;
    background: white;
    box-shadow: 0 0 8px white;
}

/* TEXTO */
.texto {
    position: absolute;
    top: 8%;
    width: 100%;
    text-align: center;
    color: white;

    font-size: 2em;
    line-height: 1.5;

    text-shadow:
        0 0 10px pink,
        0 0 20px pink,
        0 0 40px rgba(255,105,180,0.6);

    z-index: 10;
    padding: 0 20px;
}

/* 🌙 LUNA */
.moon {
    position: absolute;
    top: 55%;
    left: 50%;
    width: 240px;
    height: 240px;
    border-radius: 50%;
    transform: translate(-50%, -50%) translateZ(150px);
    cursor: pointer;

    background: url('https://upload.wikimedia.org/wikipedia/commons/e/e1/FullMoon2010.jpg');
    background-size: cover;

    box-shadow:
        inset -20px -15px 40px rgba(0,0,0,0.4),
        inset 15px 15px 30px rgba(255,255,255,0.1);
}

/* 📸 FOTO OCULTA */
.foto {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 260px;
    height: 260px;
    transform: translate(-50%, -50%) scale(0);
    border-radius: 20px;
    object-fit: cover;

    box-shadow: 0 0 30px pink;

    opacity: 0;
    transition: all 0.8s ease;

    z-index: 15;
}

/* FOTO ACTIVA */
.foto.visible {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
}
</style>

</head>

<body>

<div class="scene">
<div class="universe" id="universe">

<div class="texto">
💖 Carolina…<br><br>
Espero que cuando despiertes y veas esto,<br>
sepas que pensé en ti 💕<br><br>

Toca la luna 🌙✨
</div>

<div class="moon" onclick="mostrarFoto()"></div>

<img src="foto1.jpeg" class="foto" id="foto">

</div>
</div>

<script>
const universe = document.getElementById("universe");

/* ESTRELLAS */
for (let i = 0; i < 400; i++) {
    let star = document.createElement("div");
    star.className = "star";

    let size = Math.random() * 2;
    star.style.width = size + "px";
    star.style.height = size + "px";

    star.style.left = Math.random() * 100 + "%";
    star.style.top = Math.random() * 100 + "%";

    let z = Math.random() * 800 - 400;
    star.style.transform = `translateZ(${z}px)`;

    universe.appendChild(star);
}

/* MOVIMIENTO MOUSE */
document.addEventListener("mousemove", (e) => {
    let x = (window.innerWidth/2 - e.clientX) / 30;
    let y = (window.innerHeight/2 - e.clientY) / 30;

    universe.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

/* MOSTRAR FOTO */
function mostrarFoto() {
    const foto = document.getElementById("foto");
    foto.classList.add("visible");
}
</script>

</body>
</html>
