<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💖</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle, #1a001f, #000);
    color: white;
}

/* TEXTO */
.texto {
    position: absolute;
    top: 20%;
    width: 100%;
    text-align: center;
    font-size: 1.5em;
    line-height: 1.6em;
    text-shadow: 0 0 20px pink;
    padding: 0 20px;
}

/* IMAGEN CENTRAL */
.main {
    position: absolute;
    top: 55%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.main img {
    width: 260px;
    border-radius: 20px;
    box-shadow: 0 0 40px rgba(255,100,200,0.8);
    transition: transform 0.3s;
}

/* FOTOS FLOTANTES */
.memory {
    position: absolute;
    width: 100px;
    border-radius: 15px;
    opacity: 0;
    transition: all 2s ease;
    box-shadow: 0 0 30px pink;
}

/* CORAZONES */
.heart {
    position: absolute;
    font-size: 20px;
    animation: subir 4s ease forwards;
}

@keyframes subir {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-200px); opacity: 0; }
}
</style>

</head>

<body>

<div class="texto">
💖 No sé en qué momento te volviste mi lugar favorito,<br>
pero ahora todo tiene más sentido contigo ✨<br><br>
Si el universo existe…<br>
seguro es para que tú y yo nos encontráramos 💕
</div>

<div class="main" id="card">
<img src="https://images.unsplash.com/photo-1518199266791-5375a83190b7">
</div>

<script>

/* EFECTO 3D */
const card = document.getElementById("card");

document.addEventListener("mousemove", (e) => {
    let x = (window.innerWidth/2 - e.clientX) / 40;
    let y = (window.innerHeight/2 - e.clientY) / 40;

    card.style.transform = `translate(-50%, -50%) rotateY(${x}deg) rotateX(${y}deg)`;
});

/* IMÁGENES BONITAS */
const fotos = [
"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee",
"https://images.unsplash.com/photo-1511988617509-a57c8a288659",
"https://images.unsplash.com/photo-1519741497674-611481863552"
];

/* INTERACCIÓN */
document.addEventListener("mousemove", (e) => {

    if (Math.random() > 0.07) return;

    let img = document.createElement("img");
    img.src = fotos[Math.floor(Math.random()*fotos.length)];
    img.className = "memory";

    img.style.left = e.clientX + "px";
    img.style.top = e.clientY + "px";

    document.body.appendChild(img);

    setTimeout(() => {
        img.style.opacity = 1;
        img.style.transform = "translateY(-150px)";
    }, 50);

    setTimeout(() => img.remove(), 2000);
});

/* CORAZONES */
document.addEventListener("click", (e) => {

    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";

    heart.style.left = e.clientX + "px";
    heart.style.top = e.clientY + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 4000);
});
</script>

</body>
</html>
