<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💖</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb, #a18cd1);
    background-size: 400% 400%;
    animation: fondo 12s ease infinite;
}

/* ANIMACIÓN FONDO */
@keyframes fondo {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* CONTENEDOR */
.container {
    position: absolute;
    width: 100%;
    height: 100%;
    perspective: 1000px;
}

/* TARJETA CENTRAL */
.card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 300px;
    border-radius: 25px;
    overflow: hidden;
    backdrop-filter: blur(15px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    transition: transform 0.3s ease;
}

.card img {
    width: 100%;
}

/* TEXTO */
.title {
    position: absolute;
    top: 10%;
    width: 100%;
    text-align: center;
    font-size: 2.5em;
    color: white;
    text-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* FOTOS FLOTANTES */
.memory {
    position: absolute;
    width: 120px;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    transition: transform 1.5s ease, opacity 1.5s ease;
    opacity: 0;
}

/* CORAZONES SUAVES */
.heart {
    position: absolute;
    font-size: 18px;
    animation: subir 4s ease forwards;
    opacity: 0.8;
}

@keyframes subir {
    0% { transform: translateY(0) scale(0.8); opacity: 1; }
    100% { transform: translateY(-200px) scale(1.2); opacity: 0; }
}
</style>

</head>

<body>

<div class="container" id="container">

    <div class="title">💖 Nuestro Mundo 💖</div>

    <div class="card" id="card">
        <img src="foto1.jpg">
    </div>

</div>

<script>

const card = document.getElementById("card");

/* 3D SUAVE */
document.addEventListener("mousemove", (e) => {
    let x = (window.innerWidth/2 - e.clientX) / 40;
    let y = (window.innerHeight/2 - e.clientY) / 40;

    card.style.transform = `translate(-50%, -50%) rotateY(${x}deg) rotateX(${y}deg)`;
});

/* FOTOS FLOTANTES BONITAS */
const fotos = ["foto1.jpg","foto2.jpg","foto3.jpg","foto4.jpg"];

document.addEventListener("mousemove", (e) => {

    if (Math.random() > 0.05) return;

    let img = document.createElement("img");
    img.src = fotos[Math.floor(Math.random()*fotos.length)];
    img.className = "memory";

    img.style.left = e.clientX + "px";
    img.style.top = e.clientY + "px";

    document.body.appendChild(img);

    setTimeout(() => {
        img.style.opacity = 1;
        img.style.transform = "translateY(-150px) scale(1)";
    }, 50);

    setTimeout(() => {
        img.style.opacity = 0;
    }, 1500);

    setTimeout(() => img.remove(), 2000);
});

/* CORAZONES DELICADOS */
document.addEventListener("click", (e) => {

    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";

    heart.style.left = e.clientX + "px";
    heart.style.top = e.clientY + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 4000);
});
</script>

</body>
</html>
